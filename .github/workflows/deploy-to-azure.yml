name: Deploy to Azure

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '6.0'

      - name: Restore dependencies
        run: dotnet restore src/api

      - name: Build
        run: dotnet build src/api --configuration Release --no-restore

      - name: Publish
        run: dotnet publish src/api -c Release -o ./publish

      - name: Azure Login
        if: success()
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure App Service
        if: success()
        run: |
          az webapp up \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_APP_SERVICE_NAME }} \
            --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }} \
            --plan ${{ secrets.AZURE_APP_SERVICE_PLAN }} \
            --verbose
        env:
          DEPLOYMENT_NAME: launchcart-$(date +%s)

      - name: Deployment completed
        if: success()
        run: echo "Deployment to Azure App Service completed successfully at $(date -u +'%Y-%m-%dT%H:%M:%SZ')"

      - name: Deployment failed
        if: failure()
        run: |
          echo "Deployment to Azure App Service failed. Check logs above for details."
          exit 1